<article class="max-w-3xl mx-auto px-4 py-8">
  <header class="mb-8">
  <div class="flex justify-between items-start">
    <div>
      <h1 class="text-3xl md:text-4xl font-serif font-bold text-gray-900 mb-4">{{document.title}}</h1>
      <div class="flex items-center gap-3 text-gray-600">
        <span class="font-medium">{{document.creator.name}}</span>
        <span class="text-gray-400">·</span>
        <time>{{document.created|date}}</time>
      </div>
    </div>
  </div>
  </header>
  <div class="prose prose-lg max-w-none">
    <img src="{{document.thumbUrl}}" alt="" class="h-[300px] rounded-lg">
    {{document.content}}
  </div>
</article>
